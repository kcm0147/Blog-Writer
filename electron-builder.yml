appId: com.naver-blog-writer.app
productName: Naver Blog Writer
executableName: NaverBlogWriter
directories:
  output: release
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/*.node"
mac:
  target:
    - dmg
  category: public.app-category.productivity
  identity: "-"
win:
  target:
    - nsis
  artifactName: Naver Blog Writer-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
